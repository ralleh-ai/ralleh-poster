name: Validate Content

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run validation + publish summary
        run: npm run validate:publish

      - name: Add validation summary to job summary
        if: always()
        run: |
          if [ -f reports/validation-summary.md ]; then
            cat reports/validation-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Validation summary not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload validation report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            reports/validation-report.json
            reports/validation-trends.json
            reports/validation-summary.md
            reports/quality-badges.json
          if-no-files-found: warn
